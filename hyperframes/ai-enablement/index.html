<!doctype html>
<html
  lang="en"
  data-resolution="landscape"
  data-composition-variables='[{"id":"lang","type":"string","label":"Locale (en | he)","default":"en"}]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script
      src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"
      integrity="sha384-sG0Hv1tP1lZCk9KQmrIbY/XNwi+OY84GQqhMscbnsoBFqAz8KNCil1kvfL3Hbbk2"
      crossorigin="anonymous"
    ></script>
    <style>
      /* ============================================================
         "The Enablement" — AI Enablement Workshops offer film.
         One real backlog task is worked hands-on with agents (parallel
         lanes), the patterns are captured into a playbook for your stack,
         HUMAN REVIEW STAYS (the copper rack-focus peak over the playbook),
         and then the team runs it alone. Schematic — no product UI, no
         "Sample data" chip. One composition, two locales (`lang`; HE mirrors
         RTL). Palette + type mirror src/app/globals.css. Renders transparent.
         See DESIGN.md. Settled cinematic grammar: velocity-matched hand-offs,
         one rack focus onto the checkpoint, loop-continuous camera. NO WebGL
         bloom (flagship-only signature).
         ============================================================ */
      @font-face { font-family: "Inter"; font-weight: 400; font-display: block; src: url("assets/fonts/inter-400.woff2") format("woff2"); }
      @font-face { font-family: "Inter"; font-weight: 600; font-display: block; src: url("assets/fonts/inter-600.woff2") format("woff2"); }
      @font-face { font-family: "Geist Mono"; font-weight: 400; font-display: block; src: url("assets/fonts/geist-mono-400.woff2") format("woff2"); }
      @font-face { font-family: "Assistant"; font-weight: 600; font-display: block; src: url("assets/fonts/assistant-600-hebrew.woff2") format("woff2"); unicode-range: U+0307-0308, U+0590-05FF, U+200C-2010, U+20AA, U+25CC, U+FB1D-FB4F; }
      @font-face { font-family: "Assistant"; font-weight: 600; font-display: block; src: url("assets/fonts/assistant-600-latin.woff2") format("woff2"); unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD; }

      :root {
        --bg-0: #121211; --bg-1: #1a1a18; --bg-2: #242420;
        --fg-1: #f4f1ea; --fg-2: #b9b3aa; --fg-3: #8a847a;
        --accent: #d96832;
        --accent-soft: rgba(217, 104, 50, 0.12); --accent-rule: rgba(217, 104, 50, 0.35);
        --rule: #2a2a26; --rule-strong: #3a3a34;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden; background: transparent;
        font-family: "Inter", system-ui, sans-serif; /* HE swaps to Assistant at init */
        color: var(--fg-1); -webkit-font-smoothing: antialiased;
      }
      #stage { position: relative; width: 1920px; height: 1080px; }
      #camera { position: absolute; inset: 0; transform-origin: 960px 540px; will-change: transform; }
      /* REVIEW/CHECK/SNAPSHOT ONLY — charcoal backdrop so contrast reads true;
         removed before the transparent alpha render. inset:-40px so camera
         drift never exposes a transparent edge. */
      #review-bg { position: absolute; inset: -40px; background: var(--bg-0); }
      .mono { font-family: "Geist Mono", ui-monospace, monospace; } /* HE swaps to Assistant at init */

      /* ---------- Agent lanes ---------- */
      #lanes-svg { position: absolute; inset: 0; width: 1920px; height: 1080px; will-change: filter; }
      .lane { fill: none; stroke: var(--rule-strong); stroke-width: 2.5; }
      .tick {
        position: absolute; width: 15px; height: 15px; border-radius: 50%;
        background: var(--accent); opacity: 0; will-change: transform, opacity;
      }

      /* ---------- Task chip (the one real backlog task) ---------- */
      #task {
        position: absolute; border: 1.5px solid var(--accent-rule); border-radius: 12px;
        background: rgba(36, 36, 32, 0.6); opacity: 0;
        will-change: transform, opacity, filter;
        display: flex; align-items: center; gap: 16px; padding: 0 22px;
      }
      #task .tsq { width: 24px; height: 24px; border-radius: 6px; background: var(--accent); flex: 0 0 auto; }
      #task .tbars { display: flex; flex-direction: column; gap: 9px; flex: 1 1 auto; }
      #task .tbar { height: 7px; border-radius: 3px; background: #4a473f; }
      #task .tbar.short { width: 58%; }

      /* ---------- Playbook (the captured practice — persistent) ---------- */
      #book {
        position: absolute; border: 1.5px solid #45433c; border-radius: 14px;
        background: rgba(36, 36, 32, 0.62); opacity: 0;
        will-change: transform, opacity, filter;
        display: flex; flex-direction: column; gap: 20px; padding: 30px 28px;
      }
      #book-bar { height: 16px; border-radius: 5px; background: var(--accent); opacity: 0.9; }
      #book .pline { height: 12px; border-radius: 4px; background: #55524a; transform: scaleX(0); }
      #book .pline.short { width: 62%; }

      /* ---------- Review checkpoint (over the playbook) ---------- */
      #gate-ring {
        position: absolute; border-radius: 50%; border: 2.5px solid var(--accent);
        opacity: 0; will-change: transform, opacity;
      }
      #gate-check { position: absolute; opacity: 0; }
      #gate-check path {
        fill: none; stroke: var(--accent); stroke-width: 5; stroke-linecap: round;
        stroke-linejoin: round; stroke-dasharray: 48; stroke-dashoffset: 48;
      }

      /* ---------- Stage labels (one large centered label at a time, swaps in place) ---------- */
      .lbl {
        position: absolute; left: 580px; top: 300px; width: 760px; text-align: center;
        font-family: "Inter", sans-serif; font-weight: 600; font-size: 60px;
        letter-spacing: -0.015em; color: var(--fg-1); opacity: 0;
        white-space: nowrap; will-change: transform, opacity;
      }
      #sub0 {
        position: absolute; left: 580px; top: 384px; width: 760px; text-align: center;
        font-size: 30px; letter-spacing: 0.02em; color: var(--fg-3); opacity: 0; white-space: nowrap;
      }

      /* ---------- Caption / closing ---------- */
      #caption {
        position: absolute; left: 0; top: 968px; width: 1920px; text-align: center;
        font-family: "Inter", sans-serif; font-weight: 400; font-size: 38px;
        letter-spacing: 0.005em; color: var(--fg-2); opacity: 0;
      }
      #closing {
        position: absolute; left: 0; top: 952px; width: 1920px; text-align: center;
        font-family: "Inter", sans-serif; font-weight: 600; font-size: 62px;
        letter-spacing: -0.01em; color: var(--fg-1); opacity: 0;
      }
    </style>
  </head>

  <body>
    <div id="stage" data-composition-id="root" data-start="0" data-duration="13" data-width="1920" data-height="1080">
      <div id="camera" data-layout-allow-overflow>
        <div id="review-bg"></div>

        <!-- agent lanes -->
        <svg id="lanes-svg" viewBox="0 0 1920 1080">
          <line class="lane" id="lane0" x1="440" y1="480" x2="1180" y2="480" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" />
          <line class="lane" id="lane1" x1="440" y1="560" x2="1180" y2="560" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" />
          <line class="lane" id="lane2" x1="440" y1="640" x2="1180" y2="640" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1" />
        </svg>

        <!-- task chip -->
        <div id="task"><span class="tsq"></span><span class="tbars"><span class="tbar"></span><span class="tbar short"></span></span></div>

        <!-- work-ticks (converge into the playbook) -->
        <div class="tick" id="work0"></div>
        <div class="tick" id="work1"></div>
        <div class="tick" id="work2"></div>
        <!-- run-ticks (the team runs the lanes alone, beat 4) -->
        <div class="tick" id="run0"></div>
        <div class="tick" id="run1"></div>
        <div class="tick" id="run2"></div>

        <!-- playbook -->
        <div id="book">
          <div id="book-bar"></div>
          <div class="pline" id="pl0"></div>
          <div class="pline short" id="pl1"></div>
          <div class="pline" id="pl2"></div>
        </div>

        <!-- review checkpoint -->
        <div id="gate-ring"></div>
        <svg id="gate-check" viewBox="0 0 48 48"><path d="M12 25 l8 8 l16 -19" /></svg>

        <!-- stage labels -->
        <div class="lbl" id="lbl0"></div>
        <div class="lbl" id="lbl1"></div>
        <div class="lbl" id="lbl2"></div>
        <div class="lbl" id="lbl3"></div>
        <div class="lbl" id="lbl4"></div>
        <div class="lbl" id="lbl5"></div>
        <div id="sub0" class="mono"></div>

        <!-- text moments -->
        <div id="caption"></div>
        <div id="closing"></div>
      </div>
    </div>

    <script>
      /* ============================================================
         Deterministic 13s timeline. No random / Date / setTimeout /
         async / timeline callbacks (all text set once at init). The
         `lang` variable picks copy + mirrors the workspace for HE.
         Every on-frame string traces to ai-enablement.ts (source
         comments below; full table in DESIGN.md).
         ============================================================ */
      const vars = (window.__hyperframes && window.__hyperframes.getVariables)
        ? window.__hyperframes.getVariables() : {};
      const lang = vars.lang === "he" ? "he" : "en";

      const COPY = {
        en: {
          l0: "A real task",                                   // example.map.nodes[0].label
          sub0: "from your backlog",                           // example.map.nodes[0].sub
          l1: "Hands-on with agents",                          // example.map.nodes[1].label
          l2: "Patterns captured",                             // example.map.nodes[2].label
          l3: "Playbook for your stack",                       // example.map.nodes[3].label
          l4: "Human review stays",                            // example.map.nodes[4].label (human)
          l5: "The team runs it alone",                        // example.map.nodes[5].label (out)
          caption: "Judgment and review stay with your engineers", // how.steps[4].desc
          closing: "The playbook is yours",                    // human.items[2].desc ("The playbook is yours, in your repo…") — verbatim
        },
        he: {
          l0: "משימה אמיתית",                                   // he.example.map.nodes[0].label
          sub0: "מהבקלוג שלכם",                                 // he.example.map.nodes[0].sub
          l1: "עבודה מעשית עם סוכנים",                          // he.example.map.nodes[1].label
          l2: "דפוסים נלכדים",                                  // he.example.map.nodes[2].label
          l3: "פלייבוק לסטאק שלכם",                             // he.example.map.nodes[3].label
          l4: "הבדיקה נשארת אנושית",                            // he.example.map.nodes[4].label (human)
          l5: "הצוות רץ לבד",                                   // he.example.map.nodes[5].label (out)
          caption: "שיקול הדעת והבדיקה נשארים אצל המהנדסים שלכם", // he.how.steps[4].desc
          closing: "הפלייבוק שלכם",                             // he.human.items[2].desc ("הפלייבוק שלכם, בריפו שלכם…") — verbatim
        },
      }[lang];

      document.documentElement.lang = lang;
      // Do NOT set dir="rtl" on <html> — it blanks the hyperframes RENDER
      // pipeline. Mirror positionally via X(); set dir only on text elements.
      const isHE = lang === "he";
      if (isHE) {
        document.body.style.fontFamily = '"Assistant", system-ui, sans-serif';
        document.querySelectorAll(".mono").forEach((el) => { el.style.fontFamily = '"Assistant", system-ui, sans-serif'; });
        document.querySelectorAll(".lbl, #sub0, #caption, #closing")
          .forEach((el) => { el.dir = "rtl"; });
      }

      const setText = (id, t) => { document.getElementById(id).textContent = t; };
      setText("lbl0", COPY.l0); setText("sub0", COPY.sub0);
      setText("lbl1", COPY.l1); setText("lbl2", COPY.l2); setText("lbl3", COPY.l3);
      setText("lbl4", COPY.l4); setText("lbl5", COPY.l5);
      setText("caption", COPY.caption); setText("closing", COPY.closing);

      // ---- Geometry (EN coordinates; HE mirrors x → 1920 − x) ----
      const X = isHE ? (x) => 1920 - x : (x) => x;
      // center → top-left placement (no CSS translate → GSAP owns all transforms cleanly)
      const placeC = (id, cx, cy, w, h) => {
        const el = document.getElementById(id);
        el.style.left = X(cx) - w / 2 + "px";
        el.style.top = cy - h / 2 + "px";
        el.style.width = w + "px";
        el.style.height = h + "px";
      };

      // lanes: mirror endpoints so HE runs right→left
      const LANE_X0 = 440, LANE_X1 = 1180, LANE_Y = [480, 560, 640];
      [0, 1, 2].forEach((i) => {
        const ln = document.getElementById("lane" + i);
        ln.setAttribute("x1", X(LANE_X0)); ln.setAttribute("x2", X(LANE_X1));
      });
      const laneTravel = X(LANE_X1) - X(LANE_X0); // signed: +740 EN, −740 HE

      // task chip (center-left)
      placeC("task", 300, 560, 152, 96);
      // playbook (center-right)
      placeC("book", 1380, 560, 224, 276);
      // review ring + check over the playbook
      placeC("gate-ring", 1380, 560, 168, 168);
      placeC("gate-check", 1380, 452, 50, 50);

      // work + run ticks start at each lane's left edge (top-left anchored → x-tween is clean)
      const TICK = 15;
      [0, 1, 2].forEach((i) => {
        placeC("work" + i, LANE_X0, LANE_Y[i], TICK, TICK);
        placeC("run" + i, LANE_X0, LANE_Y[i], TICK, TICK);
      });

      // pattern-line draw direction follows reading order
      gsap.set("#book .pline", { transformOrigin: isHE ? "right center" : "left center" });

      // ---- Timeline ----
      // Settled grammar: velocity-matched hand-offs (exits accelerate + blur,
      // entries decelerate from blur), a rack focus onto the copper review
      // checkpoint at the peak, and a loop-continuous camera (identity at t=0
      // and t=13). The rack refocuses before the tail so the seam is crisp.
      const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out", overwrite: "auto" } });

      const showLabel = (id, at) =>
        tl.fromTo("#" + id, { opacity: 0, y: 16, filter: "blur(10px)" },
          { opacity: 1, y: 0, filter: "blur(0px)", duration: 0.55, ease: "power2.out" }, at);
      const hideLabel = (id, at) =>
        tl.to("#" + id, { opacity: 0, y: -12, filter: "blur(10px)", duration: 0.45, ease: "power2.in" }, at);

      // ===== BEAT 0 — The task (0.0–2.0) =====
      // entrance offset mirrors for HE (slide in with the RTL reading flow)
      const enterX = isHE ? 40 : -40;
      tl.fromTo("#task", { opacity: 0, x: enterX, filter: "blur(8px)" }, { opacity: 1, x: 0, filter: "blur(0px)", duration: 0.7, ease: "power2.out" }, 0.4);
      showLabel("lbl0", 0.7);
      tl.fromTo("#sub0", { opacity: 0, y: 10 }, { opacity: 1, y: 0, duration: 0.5 }, 1.0);

      // ===== BEAT 1 — Hands-on with agents (2.0–4.3) =====
      hideLabel("lbl0", 2.05); tl.to("#sub0", { opacity: 0, y: -10, duration: 0.4, ease: "power2.in" }, 2.15);
      // lanes draw out
      tl.to(["#lane0", "#lane1", "#lane2"], { strokeDashoffset: 0, duration: 0.9, ease: "power1.inOut", stagger: 0.1 }, 2.3);
      showLabel("lbl1", 2.5);
      // work-ticks travel each lane (velocity-matched: ease into the far end)
      const workTravel = (id, at) =>
        tl.fromTo("#" + id, { opacity: 0, x: 0 }, { opacity: 1, x: laneTravel, duration: 1.4, ease: "power2.inOut" }, at);
      workTravel("work0", 2.7); workTravel("work1", 2.86); workTravel("work2", 3.02);

      // ===== BEAT 2 — Patterns captured → Playbook (4.3–6.8) =====
      hideLabel("lbl1", 4.35);
      // ticks converge into the playbook + blur out (velocity-matched exit)
      tl.to(["#work0", "#work1", "#work2"], { x: X(1380) - X(LANE_X0), y: 0, scale: 0.5, opacity: 0, filter: "blur(10px)", duration: 0.55, ease: "power2.in", stagger: 0.05 }, 4.45);
      showLabel("lbl2", 4.55);
      // the playbook assembles (decelerate from blur), pattern lines draw
      tl.fromTo("#book", { opacity: 0, y: 22, scale: 0.96, filter: "blur(8px)" }, { opacity: 1, y: 0, scale: 1, filter: "blur(0px)", duration: 0.7, ease: "power2.out" }, 4.9);
      tl.to("#pl0", { scaleX: 1, duration: 0.45, ease: "power2.out" }, 5.35);
      tl.to("#pl1", { scaleX: 1, duration: 0.45, ease: "power2.out" }, 5.5);
      tl.to("#pl2", { scaleX: 1, duration: 0.45, ease: "power2.out" }, 5.65);
      // label swaps to the bound playbook
      hideLabel("lbl2", 5.75); showLabel("lbl3", 5.95);
      tl.to("#book", { borderColor: "rgba(217,104,50,0.5)", duration: 0.5 }, 5.95); // copper edge — persistent

      // ===== BEAT 3 — PEAK: human review stays (6.8–9.3) =====
      hideLabel("lbl3", 6.75); showLabel("lbl4", 7.15);
      // RACK FOCUS — lanes + task + any residual defocus + dim; the review
      // checkpoint over the playbook stays sharp. Camera pushes in (below).
      const UPSTREAM = ["#lanes-svg", "#task"];
      tl.to(UPSTREAM, { filter: "blur(7px)", opacity: 0.38, duration: 0.75, ease: "power2.inOut" }, 7.5);
      tl.to("#book", { boxShadow: "0 0 50px 0 rgba(217,104,50,0.4)", scale: 1.05, duration: 0.6 }, 7.55);
      // one bounded copper ring bloom (immediateRender:false so the "from"
      // state does not paint from t=0)
      tl.fromTo("#gate-ring", { opacity: 0.9, scale: 0.55, transformOrigin: "center" },
        { opacity: 0, scale: 1.8, duration: 1.1, ease: "power2.out", immediateRender: false }, 7.7);
      // reviewed by a person — the check draws in
      tl.to("#gate-check", { opacity: 1, duration: 0.2 }, 8.4);
      tl.to("#gate-check path", { strokeDashoffset: 0, duration: 0.55, ease: "power2.inOut" }, 8.45);
      // review line appears verbatim (decelerate from blur)
      tl.fromTo("#caption", { opacity: 0, y: 12, filter: "blur(8px)" }, { opacity: 1, y: 0, filter: "blur(0px)", duration: 0.6, ease: "power2.out" }, 8.5);

      // ===== BEAT 4 — The team runs it alone (9.3–11.0) =====
      // REFOCUS — the rack releases so the loop seam is crisp.
      tl.to(UPSTREAM, { filter: "blur(0px)", opacity: 1, duration: 0.8, ease: "power2.inOut" }, 9.35);
      tl.to("#book", { boxShadow: "0 0 34px 0 rgba(217,104,50,0.16)", scale: 1, duration: 0.8, ease: "power2.inOut" }, 9.35);
      hideLabel("lbl4", 9.4); showLabel("lbl5", 9.7);
      // the lanes resume on their own — run-ticks fade in at the lane start and
      // travel to the end once (single pass). immediateRender:false + an
      // opacity:0 "from" keep them hidden through beats 0–3 (a fromTo defaults
      // to immediateRender:true, which would paint the "from" state at t=0);
      // a single pass (no repeat) avoids a hard snap-back and finishes before
      // t=13 so nothing is frozen mid-tween at the seam.
      const runTravel = (id, at) =>
        tl.fromTo("#" + id, { opacity: 0, x: 0 }, { x: laneTravel, opacity: 0.9, duration: 1.6, ease: "sine.inOut", immediateRender: false }, at);
      runTravel("run0", 9.9); runTravel("run1", 10.05); runTravel("run2", 10.2);

      // ===== BEAT 5 — The playbook is yours (11.0–13.0) =====
      tl.to("#caption", { opacity: 0, y: -12, filter: "blur(10px)", duration: 0.5, ease: "power2.in" }, 11.0);
      hideLabel("lbl5", 11.1);
      tl.fromTo("#closing", { opacity: 0, y: 16, filter: "blur(10px)" }, { opacity: 1, y: 0, filter: "blur(0px)", duration: 0.75, ease: "power2.out" }, 11.35);
      tl.to("#book", { boxShadow: "0 0 44px 0 rgba(217,104,50,0.12)", duration: 0.9, ease: "sine.inOut" }, 11.5);

      // ===== CAMERA — loop-continuous (identity at t=0 AND t=13) =====
      // Push gently INTO the review peak, hold, then settle back so the seam
      // matches. Micro-drift overlays: integer sine cycles on both axes (1× X,
      // 2× Y) so dx,dy return to 0 at the seam; the 2:1 ratio avoids a
      // mechanical diagonal. scale AND drift are pure functions of timeline
      // time — no reads of a sibling tween — so every seek/worker is identical.
      const camEl = document.getElementById("camera");
      const DRIFT_AMP_X = 5, DRIFT_AMP_Y = 3;
      const camEase = gsap.parseEase("power2.inOut");
      const scaleAt = (t) => {
        if (t <= 5.8) return 1.0;
        if (t < 8.0) return 1.0 + 0.03 * camEase((t - 5.8) / 2.2);
        if (t <= 9.6) return 1.03;
        if (t < 12.5) return 1.03 - 0.03 * camEase((t - 9.6) / 2.9);
        return 1.0;
      };
      const drift = { p: 0 };
      tl.to(drift, {
        p: 1, duration: 13, ease: "none",
        onUpdate: () => {
          const t = drift.p * 13;
          const dx = Math.sin(drift.p * Math.PI * 2) * DRIFT_AMP_X;
          const dy = Math.sin(drift.p * Math.PI * 4) * DRIFT_AMP_Y;
          camEl.style.transform = `scale(${scaleAt(t)}) translate(${dx}px, ${dy}px)`;
        },
      }, 0);

      window.__timelines = window.__timelines || {};
      window.__timelines["root"] = tl;
    </script>
  </body>
</html>
